<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNG Gráfica Rápida - Loja Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .cart-drawer {
            transition: transform 0.3s ease-in-out;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        .tng-logo-container {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid #e5e7eb;
        }

        .cart-button-outline {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            transition: all 0.2s;
        }

        .cart-button-filled {
            background-color: #0071e3;
            color: white;
            border-radius: 8px;
            padding: 8px 24px;
            font-weight: 600;
            transition: all 0.2s;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <script>
        // CONFIGURAÇÕES GERAIS
        const STORE_CONFIG = {
            name: "TNG Gráfica Rápida",
            whatsappNumber: "556232896657",
            currency: "R$",
            logoCircular: "uploaded:449692177_1170187230792604_6008068252314116750_n.jpg",
            bannerFachada: "uploaded:image_05e383.png",
            
            products: [
                { id: 1, name: "Cartão de Visita", price: 45.00, description: "1000 unidades, Papel Couchê 300g", image: "uploaded:image_05e383.png" },
                { id: 2, name: "Panfleto A5", price: 89.90, description: "500 unidades, Colorido Frente", image: "uploaded:image_05e383.png" },
                { id: 3, name: "Banner Lona", price: 65.00, description: "60x90cm com acabamento", image: "uploaded:image_05e383.png" },
                { id: 4, name: "Adesivo Redondo", price: 30.00, description: "100 unidades, 5x5cm", image: "uploaded:image_05e383.png" },
                { id: 5, name: "Caderno Personalizado", price: 45.00, description: "Capa dura, 100 folhas", image: "uploaded:image_05e383.png" },
                { id: 6, name: "Talão de Pedido", price: 25.00, description: "50 folhas, Autocopiativo", image: "uploaded:image_05e383.png" }
            ]
        };
    </script>

    <!-- Header -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 py-3">
        <div class="container mx-auto px-4 md:px-10 flex justify-between items-center">
            
            <div class="flex items-center gap-4">
                <div class="tng-logo-container">
                    <img src="uploaded:449692177_1170187230792604_6008068252314116750_n.jpg" alt="TNG Logo" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                </div>
                <div class="flex items-center text-[18px] md:text-[20px]">
                    <span class="font-bold text-gray-900">TNG Gráfica Rápida</span>
                    <span class="mx-2 text-gray-300">-</span>
                    <span class="text-[#0071e3] font-medium">Loja Online</span>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleCart()" class="cart-button-outline hidden sm:flex">
                    <i class="fas fa-shopping-bag text-gray-400"></i>
                    <span class="text-gray-600 text-sm">Carrinho <span class="ml-1 text-blue-600 font-medium">R$ <span id="cart-total-header">0</span></span></span>
                </button>
                <button onclick="toggleCart()" class="cart-button-filled">
                    Ver <span id="cart-count-label">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="py-16 md:py-20 bg-white">
        <div class="container mx-auto px-4 md:px-10 flex flex-col md:flex-row items-center gap-12">
            <div class="md:w-3/5">
                <h1 class="text-4xl md:text-6xl font-extrabold text-gray-900 mb-6 leading-tight uppercase italic">
                    Sua Marca em <br>
                    <span class="text-blue-600">Alta Definição</span>
                </h1>
                <p class="text-xl text-gray-500 mb-8 max-w-lg">
                    TNG Gráfica Rápida: Qualidade, compromisso e o melhor suporte de Goiânia para o seu negócio.
                </p>
                <a href="#produtos-lista" class="bg-[#0071e3] text-white px-10 py-4 rounded-lg font-bold text-lg hover:bg-blue-700 transition shadow-lg inline-block text-center">
                    Ver Produtos
                </a>
            </div>
            <div class="md:w-2/5 relative">
                <div class="absolute -inset-4 bg-blue-100 rounded-full blur-3xl opacity-30"></div>
                <img src="uploaded:image_05e383.png" alt="TNG Fachada" class="relative w-full h-auto rounded-3xl shadow-2xl border-4 border-white" onerror="this.src='https://via.placeholder.com/600x400'">
            </div>
        </div>
    </section>

    <!-- Catálogo de Produtos -->
    <main class="container mx-auto px-4 md:px-10 py-12" id="produtos-lista">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-8 border-b border-gray-100 pb-8">
            <h2 class="text-3xl font-extrabold text-gray-900 italic uppercase">Nossos Serviços</h2>
            <div class="relative w-full md:w-80">
                <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="O que você precisa?" class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <div class="absolute left-4 top-3.5 text-gray-400">
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Produtos renderizados via JS -->
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-16">
        <div class="container mx-auto px-4 md:px-10 text-center">
            <img src="uploaded:449692177_1170187230792604_6008068252314116750_n.jpg" alt="TNG" class="w-20 h-20 rounded-full mx-auto mb-6 object-cover border-2 border-blue-600" onerror="this.src='https://via.placeholder.com/150'">
            <p class="text-gray-400">&copy; <span id="year"></span> TNG Gráfica Rápida. (62) 3289-6657</p>
        </div>
    </footer>

    <!-- Carrinho Lateral -->
    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] hidden"></div>
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[70] shadow-2xl cart-drawer translate-x-full flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-blue-600 text-white">
            <h3 class="text-xl font-bold uppercase italic">Seu Carrinho</h3>
            <button onclick="toggleCart()" class="text-white/80 hover:text-white transition">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50"></div>
        <div class="p-6 border-t bg-white">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-500 font-semibold">Total:</span>
                <span id="cart-total" class="text-2xl font-black text-gray-900">R$ 0,00</span>
            </div>
            <button onclick="checkout()" class="w-full py-4 bg-green-500 text-white rounded-xl font-bold text-lg flex items-center justify-center gap-3 hover:bg-green-600 transition">
                <i class="fab fa-whatsapp text-2xl"></i> Finalizar Pedido
            </button>
        </div>
    </div>

    <script>
        let cart = [];

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            renderProducts(STORE_CONFIG.products);
        });

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            if (list.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400">Nenhum produto encontrado.</div>';
                return;
            }
            grid.innerHTML = list.map(product => `
                <div class="bg-white rounded-3xl shadow-sm hover:shadow-xl product-card border border-gray-100 flex flex-col overflow-hidden transition-all duration-300">
                    <div class="relative h-56 w-full overflow-hidden bg-gray-100">
                        <img src="${product.image}" alt="${product.name}" class="h-full w-full object-cover" onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                    <div class="p-6 flex flex-col flex-1">
                        <h4 class="text-lg font-bold text-gray-900 mb-1">${product.name}</h4>
                        <p class="text-gray-500 text-sm mb-4 flex-1 line-clamp-2">${product.description}</p>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-xl font-black text-gray-900">R$ ${product.price.toFixed(2)}</span>
                            <button onclick="addToCart(${product.id})" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = STORE_CONFIG.products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.description.toLowerCase().includes(query)
            );
            renderProducts(filtered);
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('translate-x-full');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        function addToCart(id) {
            const prod = STORE_CONFIG.products.find(p => p.id === id);
            const exists = cart.find(i => i.id === id);
            if (exists) {
                exists.quantity++;
            } else {
                cart.push({...prod, quantity: 1});
            }
            updateUI();
            if (document.getElementById('cart-drawer').classList.contains('translate-x-full')) {
                toggleCart();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function updateUI() {
            const itemsCont = document.getElementById('cart-items');
            const totalLabel = document.getElementById('cart-total');
            const countLabel = document.getElementById('cart-count-label');
            const headerTotal = document.getElementById('cart-total-header');

            const count = cart.reduce((a, b) => a + b.quantity, 0);
            countLabel.innerText = count;

            if (cart.length === 0) {
                itemsCont.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-gray-400">
                        <i class="fas fa-shopping-basket text-4xl mb-4"></i>
                        <p>Carrinho vazio</p>
                    </div>`;
                totalLabel.innerText = 'R$ 0,00';
                headerTotal.innerText = '0';
                return;
            }

            let total = 0;
            itemsCont.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="flex items-center gap-4 bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                        <img src="${item.image}" class="w-14 h-14 rounded-lg object-cover" onerror="this.src='https://via.placeholder.com/100'">
                        <div class="flex-1">
                            <h5 class="font-bold text-sm text-gray-900">${item.name}</h5>
                            <p class="text-blue-600 text-xs font-bold">${item.quantity}x R$ ${item.price.toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-gray-300 hover:text-red-500 p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            }).join('');
            
            totalLabel.innerText = `R$ ${total.toFixed(2)}`;
            headerTotal.innerText = Math.floor(total);
        }

        function checkout() {
            if (cart.length === 0) return;
            let msg = `*PEDIDO TNG GRÁFICA*\n\n`;
            let total = 0;
            cart.forEach(i => {
                const sub = i.price * i.quantity;
                total += sub;
                msg += `• ${i.quantity}x ${i.name} (R$ ${sub.toFixed(2)})\n`;
            });
            msg += `\n*TOTAL: R$ ${total.toFixed(2)}*`;
            window.open(`https://wa.me/${STORE_CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
